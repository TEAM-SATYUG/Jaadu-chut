<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome To Oxygen Service Shop</title>

<style>
:root {
    --bg: #020617;
    --card: rgba(255,255,255,0.05);
    --border: rgba(255,255,255,0.08);
    --text: #e5e7eb;
    --sub: #94a3b8;
    --accent: #22c55e;
}

body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: radial-gradient(circle at top, #0f172a, #020617 70%);
    color: var(--text);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

/* APP */
.app {
    width: 100%;
    max-width: 420px;
    padding: 20px;
}

/* CARD */
.card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 22px;
    padding: 26px;
    backdrop-filter: blur(18px);
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    animation: fade 0.4s ease;
}

/* TEXT */
h1 {
    font-size: 24px;
    margin-bottom: 6px;
}

p {
    font-size: 14px;
    color: var(--sub);
}

/* BUTTON */
.btn {
    width: 100%;
    padding: 14px;
    margin-top: 14px;
    border-radius: 12px;
    border: none;
    font-weight: 600;
    cursor: pointer;
    background: linear-gradient(135deg, #22c55e, #06b6d4);
    color: black;
    transition: 0.25s;
}

.btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(34,197,94,0.35);
}

.btn-secondary {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
}

/* USER */
.user {
    font-size: 13px;
    color: var(--sub);
    margin-bottom: 10px;
}

/* VIDEO */
video {
    width: 100%;
    border-radius: 14px;
    margin-top: 12px;
}

/* LIVE USERS */
.live {
    margin-top: 10px;
    font-size: 13px;
    color: var(--sub);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
}

.dot {
    width: 8px;
    height: 8px;
    background: var(--accent);
    border-radius: 50%;
    animation: blink 1s infinite;
}

@keyframes blink {
    0%,100%{opacity:1;}
    50%{opacity:0.3;}
}

/* REVIEWS */
.reviews {
    height: 70px;
    overflow: hidden;
    margin-top: 15px;
}

.review {
    animation: slide 4s linear;
}

@keyframes slide {
    0% { transform: translateY(30px); opacity: 0;}
    20% { opacity: 1;}
    80% { opacity: 1;}
    100% { transform: translateY(-30px); opacity: 0;}
}

/* MODAL */
.modal {
    position: fixed;
    inset: 0;
    display: none;
    justify-content: center;
    align-items: center;
    background: rgba(0,0,0,0.6);
}

.modal-box {
    background: #020617;
    padding: 20px;
    border-radius: 16px;
    width: 90%;
    max-width: 350px;
    border: 1px solid var(--border);
}

textarea {
    width: 100%;
    height: 80px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: transparent;
    color: white;
    padding: 10px;
    margin-top: 10px;
}

/* SCREENS */
.screen { display: none; }
.active { display: block; }

/* ANIM */
@keyframes fade {
    from {opacity:0; transform: translateY(10px);}
    to {opacity:1; transform: translateY(0);}
}

/* SHAKE */
.shake {
    animation: shake 0.3s;
}
@keyframes shake {
    25%{transform:translate(4px,-4px);}
    50%{transform:translate(-4px,4px);}
    75%{transform:translate(4px,4px);}
}
</style>
</head>

<body>

<div class="app">

<!-- SCREEN 1 -->
<div id="s1" class="screen active">
    <div class="card">
        <h1>Oxygen Randi Store</h1>
        <p>Premium digital rand experience for my 24/7 services</p>

        <button class="btn" onclick="go('s1','s2')">Continue</button>

        <p style="margin-top:15px; font-size:12px;">
            Trusted by 10K+ users
        </p>
    </div>
</div>

<!-- SCREEN 2 -->
<div id="s2" class="screen">
    <div class="card">
        <div id="user" class="user"></div>

        <h1>Oxygen Current Content:</h1>

        <button class="btn" onclick="go('s2','s3')">
            Oxygen Digital Randi 🥵 Service
        </button>

        <button class="btn btn-secondary" onclick="openModal()">
            Review Do
        </button>

        <div class="reviews" id="reviews"></div>
    </div>
</div>

<!-- SCREEN 3 -->
<div id="s3" class="screen">
    <div class="card">
        <h1>Feel Kro Baby Mujhe Ahhh Aaa🥵...</h1>

        <video autoplay muted loop playsinline>
            <source src="https://files.catbox.moe/5eoizx.mp4">
        </video>

        <!-- LIVE USERS -->
        <div class="live">
            <div class="dot"></div>
            <span id="liveCount">128</span> users watching now
        </div>

        <button class="btn" onclick="play()">Click Kro Baby Yha 🥵🥵</button>
        <button class="btn btn-secondary" onclick="openModal()">Review</button>
    </div>
</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
    <div class="modal-box">
        <h3>Review Do</h3>
        <textarea id="input"></textarea>

        <button class="btn" onclick="submit()">Submit</button>
        <button class="btn btn-secondary" onclick="closeModal()">Close</button>
    </div>
</div>

<audio id="audio" src="https://files.catbox.moe/6ygimy.ogg"></audio>

<script>
// USER
let params = new URLSearchParams(location.search);
let username = params.get("user") || "For Service Dm ~ @Welostoxy";
document.getElementById("user").innerText = username;

// NAV
function go(a,b){
    document.getElementById(a).classList.remove("active");
    document.getElementById(b).classList.add("active");
}

// SOUND
function play(){
    let a = document.getElementById("audio");
    let body = document.body;

    a.currentTime = 0;
    a.play();

    body.classList.add("shake");
    setTimeout(()=>body.classList.remove("shake"),300);
}

// LIVE USERS COUNTER
let count = 128;
function updateUsers(){
    let change = Math.floor(Math.random()*5) - 2;
    count += change;

    if(count < 80) count = 80;
    if(count > 250) count = 250;

    document.getElementById("liveCount").innerText = count;
}
setInterval(updateUsers, 2000);

// REVIEWS
let data = [
"Best experience ever ,Haar Baar Oxygen ki chut Aab Toh🥵🥵🥵🥶",
"Feels Premium Without Bullon 🌚🥵",
"Smooth feels by oxygen service 🥵",
"Worth it mera toh din bngya oxy ki gand dekh kr 🥵🥵🥵",
"Oxygen Ki Gand Ke Aage Sbb Fail hai bhai 🥵🥵"
];

function loop(){
    let box = document.getElementById("reviews");
    let txt = data[Math.floor(Math.random()*data.length)];

    let div = document.createElement("div");
    div.className = "review";
    div.innerText = txt;

    box.innerHTML = "";
    box.appendChild(div);
}
setInterval(loop, 2500);
loop();

// MODAL
function openModal(){ modal.style.display="flex"; }
function closeModal(){ modal.style.display="none"; }

function submit(){
    let v = input.value;
    if(!v.trim()) return alert("Write something");

    data.unshift(username + ": " + v);
    closeModal();
}
</script>

</body>
</html>
